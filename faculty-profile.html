<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Profile | RITB</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <style>
    .profile-hero {
      background: var(--surface-container-low);
      padding: 6rem 0 4rem;
      position: relative;
      overflow: hidden;
    }

    .profile-hero::after {
      content: '';
      position: absolute;
      right: -10%;
      top: -20%;
      width: 50%;
      height: 150%;
      background: var(--primary-fixed);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      z-index: 0;
    }

    .profile-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--surface-container-lowest);
      box-shadow: 0 12px 32px rgba(0, 49, 120, 0.15);
    }

    .profile-tab {
      background: none;
      border: none;
      padding: 1rem 2rem;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--on-surface-variant);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
    }

    .profile-tab:hover {
      color: var(--primary);
    }

    .profile-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">RITB</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="news-archive.html">News</a>
        <a href="events-calendar.html">Events</a>
        <a href="faculty-directory.html" class="active">Faculty</a>
      </div>
      <div class="nav-actions" id="nav-actions"></div>
    </div>
  </nav>

  <div class="page-top">
    <div id="loading" style="padding:6rem 0;text-align:center">
      <div class="skeleton" style="width:180px;height:180px;border-radius:50%;margin:0 auto 2rem"></div>
      <div class="skeleton" style="width:300px;height:2.5rem;margin:0 auto 1rem;border-radius:var(--radius-md)"></div>
    </div>

    <div id="profile-content" class="hidden">
      <section class="profile-hero">
        <div class="container" style="position:relative;z-index:1">
          <div style="display:flex;align-items:center;gap:3rem;flex-wrap:wrap">
            <img id="f-img" src="" alt="" class="profile-avatar" onerror="imgFallback(this,'faculty')">
            <div>
              <span class="chip chip-primary label-sm mb-3">Faculty Member</span>
              <h1 class="display-sm font-display" id="f-name" style="margin-bottom:0.5rem;color:var(--primary)">Name
              </h1>
              <p class="title-lg text-muted mb-4"><span id="f-title">Title</span> • <span id="f-dept">Department</span>
              </p>
              <div class="flex gap-2 flex-wrap" id="f-areas"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Tabs -->
      <div
        style="background:var(--surface-container-lowest);border-bottom:1px solid var(--surface-container-high);position:sticky;top:72px;z-index:90">
        <div class="container-narrow flex">
          <button class="profile-tab active" onclick="switchTab('bio')">Biography</button>
          <button class="profile-tab" onclick="switchTab('academic')">Academic Profile</button>
        </div>
      </div>

      <section class="section-sm">
        <div class="container-narrow">
          <!-- Bio Tab -->
          <div id="tab-bio" class="tab-content active">
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:4rem">
              <div>
                <h3 class="display-sm font-display mb-4">About</h3>
                <p class="body-lg" style="color:var(--on-surface-variant);white-space:pre-wrap" id="f-bio"></p>
              </div>
              <div>
                <div style="background:var(--surface-container-low);padding:2rem;border-radius:var(--radius-lg)">
                  <h4 class="title-md mb-4 font-display">Contact & Availability</h4>
                  <a href="#" class="flex items-center gap-3 text-muted mb-3 hover:text-primary"
                    style="text-decoration:none">
                    <span class="material-symbols-rounded">mail</span>
                    <span id="f-email"></span>
                  </a>
                  <div class="flex items-center gap-3 text-muted">
                    <span class="material-symbols-rounded">business</span>
                    <span>Office Hours: By Appointment</span>
                  </div>
                  <button class="btn btn-outline btn-full mt-6"
                    onclick="showToast('Meeting request sent','success')">Request Meeting</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Academic Tab -->
          <div id="tab-academic" class="tab-content">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4rem">
              <div>
                <h3 class="display-sm font-display mb-4 text-primary">Selected Publications</h3>
                <ul style="list-style:none" id="f-pubs"></ul>
              </div>
              <div>
                <h3 class="display-sm font-display mb-4 text-primary">Courses Taught</h3>
                <ul style="list-style:none" id="f-courses"></ul>
              </div>
            </div>
          </div>

        </div>
      </section>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">© 2024 RITB. All rights reserved.</div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function loadProfile() {
      if (!id) return;
      try {
        const f = await apiFetch(`/api/faculty/${id}`);
        document.title = `${f.name} | RITB`;
        document.getElementById('f-img').src = f.photo_url || '';
        document.getElementById('f-name').textContent = f.name;
        document.getElementById('f-title').textContent = f.title;
        document.getElementById('f-dept').textContent = f.department;
        document.getElementById('f-bio').textContent = f.bio;
        document.getElementById('f-email').textContent = f.email;

        const areas = (f.research_areas || '').split(',').filter(x => x);
        document.getElementById('f-areas').innerHTML = areas.map(a => `<span class="chip chip-tertiary">${a.trim()}</span>`).join('');

        const pubs = f.publications || [];
        document.getElementById('f-pubs').innerHTML = pubs.length ? pubs.map(p => `
      <li style="padding-bottom:1.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--surface-container)">
        <p class="body-md font-weight-bold" style="color:var(--on-surface)">${p}</p>
      </li>`).join('') : '<p class="text-muted">No publications listed.</p>';

        const courses = f.courses || [];
        document.getElementById('f-courses').innerHTML = courses.length ? courses.map(c => `
      <li style="padding-bottom:1.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--surface-container)">
        <p class="body-md font-weight-bold" style="color:var(--on-surface)">${c}</p>
      </li>`).join('') : '<p class="text-muted">No courses listed.</p>';

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('profile-content').classList.remove('hidden');
      } catch (e) { console.error(e); }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    loadProfile();
  </script>
</body>

</html>
